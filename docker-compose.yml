version: '3.8'

services:
  # Phase 1: Data Ingestion
  phase1-api:
    build:
      context: ./phase1
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - ENVIRONMENT=development
    depends_on:
      - postgres
      - redis
    volumes:
      - ./phase1/config:/app/config
      - ./phase1/logs:/app/logs
    networks:
      - review-pulse-network
    restart: unless-stopped

  # Phase 2: Data Processing
  phase2-api:
    build:
      context: ./phase2
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - ENVIRONMENT=development
    depends_on:
      - postgres
      - redis
    volumes:
      - ./phase2/config:/app/config
      - ./phase2/logs:/app/logs
      - phase2-chroma:/app/chroma_db
    networks:
      - review-pulse-network
    restart: unless-stopped

  # Phase 3: Analysis and Clustering
  phase3-api:
    build:
      context: ./phase3
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - ENVIRONMENT=development
    depends_on:
      - postgres
      - redis
    volumes:
      - ./phase3/config:/app/config
      - ./phase3/logs:/app/logs
    networks:
      - review-pulse-network
    restart: unless-stopped

  # Phase 4: Report Generation
  phase4-api:
    build:
      context: ./phase4
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    environment:
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - ENVIRONMENT=development
    depends_on:
      - postgres
      - redis
    volumes:
      - ./phase4/config:/app/config
      - ./phase4/templates:/app/templates
      - ./phase4/logs:/app/logs
    networks:
      - review-pulse-network
    restart: unless-stopped

  # Phase 5: MCP Integration and Delivery
  phase5-api:
    build:
      context: ./phase5
      dockerfile: Dockerfile
    ports:
      - "8005:8005"
    environment:
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=http://localhost:8005/oauth/callback
      - DEFAULT_SENDER_EMAIL=${DEFAULT_SENDER_EMAIL}
      - OAUTH_STATE_SECRET=${OAUTH_STATE_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - ENVIRONMENT=development
    depends_on:
      - postgres
      - redis
    volumes:
      - ./phase5/config:/app/config
      - ./phase5/logs:/app/logs
    networks:
      - review-pulse-network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=review_pulse
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - review-pulse-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - review-pulse-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - phase1-api
      - phase2-api
      - phase3-api
      - phase4-api
      - phase5-api
    networks:
      - review-pulse-network
    restart: unless-stopped

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - review-pulse-network
    restart: unless-stopped

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - review-pulse-network
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  phase2-chroma:
  prometheus-data:
  grafana-data:

networks:
  review-pulse-network:
    driver: bridge
