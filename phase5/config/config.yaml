# Phase 5 Configuration - MCP Integration and Delivery

# Google API Configuration
google_api:
  client_id: ${GOOGLE_CLIENT_ID}
  client_secret: ${GOOGLE_CLIENT_SECRET}
  redirect_uri: ${GOOGLE_REDIRECT_URI}
  scopes:
    docs: https://www.googleapis.com/auth/documents
    drive: https://www.googleapis.com/auth/drive
    gmail_send: https://www.googleapis.com/auth/gmail.send
    gmail_compose: https://www.googleapis.com/auth/gmail.compose
    gmail_readonly: https://www.googleapis.com/auth/gmail.readonly

# MCP Server Configuration
mcp_servers:
  docs:
    port: 8001
    host: localhost
    protocol_version: 0.2.0
    timeout: 30
    retry_attempts: 3
    retry_delay: 1
  
  gmail:
    port: 8002
    host: localhost
    protocol_version: 0.2.0
    timeout: 30
    retry_attempts: 3
    retry_delay: 1

# Email Configuration
email:
  default_sender: ${DEFAULT_SENDER_EMAIL}
  subject_prefix: ${EMAIL_SUBJECT_PREFIX}
  signature: Generated by Review Pulse System
  rate_limit_per_minute: 50
  max_attachment_size_mb: 25
  supported_formats: [html, markdown, plain]

# OAuth Configuration
oauth:
  state_secret: ${OAUTH_STATE_SECRET}
  token_encryption_key: ${TOKEN_ENCRYPTION_KEY}
  token_expiry_hours: 1
  refresh_buffer_minutes: 5

# Stakeholder Management
stakeholder_management:
  default_frequency: weekly
  supported_frequencies: [weekly, biweekly, monthly, on_demand]
  supported_formats: [html, markdown, pdf]
  default_timezone: UTC
  max_recipients_per_report: 50

# Delivery Rules
delivery_rules:
  default_delivery_day: Monday
  default_delivery_time: "09:00"
  include_attachments: true
  share_document: true
  document_permission: reader
  retry_failed_deliveries: true
  max_retry_attempts: 3
  retry_delay_hours: 2

# Database Configuration (for storing tokens and delivery records)
database:
  host: localhost
  port: 5432
  database: review_pulse_phase5
  username: postgres
  password: ${DB_PASSWORD}
  pool_size: 10
  max_overflow: 20

# Redis Configuration (for caching and session management)
redis:
  host: localhost
  port: 6379
  db: 5
  password: ${REDIS_PASSWORD}
  max_connections: 10
  session_ttl: 3600

# Security Configuration
security:
  jwt_secret: ${JWT_SECRET}
  cors_enabled: true
  cors_origins:
    - http://localhost:3000
    - http://localhost:8080
    - http://localhost:8000
  rate_limiting:
    enabled: true
    requests_per_minute: 100
  authentication:
    enabled: true
    session_timeout: 3600

# Monitoring Configuration
monitoring:
  metrics_enabled: true
  health_check_interval: 30
  performance_tracking: true
  error_tracking: true
  log_level: INFO
  log_file: logs/phase5.log

# API Configuration
api:
  host: 0.0.0.0
  port: 8005
  debug: false
  workers: 4
  reload: false
  log_level: INFO

# Phase 5 Specific Settings
phase5:
  # Document settings
  document_title_template: "Weekly Review Report - {product_id} - Week {week_number} ({date})"
  document_folder_id: null  # Optional: specify Google Drive folder ID
  
  # Email settings
  email_template_path: ./templates/email.html
  include_analytics_tracking: true
  track_opens: true
  track_clicks: true
  
  # Delivery scheduling
  enable_scheduling: true
  scheduling_timezone: UTC
  batch_processing: true
  batch_size: 10
  
  # Quality and validation
  validate_recipients: true
  validate_content: true
  max_content_length: 1000000  # 1MB
  require_subject: true
  
  # Error handling
  retry_on_failure: true
  max_retries: 3
  retry_backoff_factor: 2
  notify_on_failure: true
  failure_notification_email: admin@company.com
