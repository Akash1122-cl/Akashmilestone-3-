    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./phase5/coverage.xml
        flags: phase5

  edge-case-tests:
    runs-on: ubuntu-latest
    needs: [test-phase1, test-phase2, test-phase3, test-phase4, test-phase5]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        for phase in phase1 phase2 phase3 phase4 phase5; do
          cd $phase
          pip install -r requirements.txt
          cd ..
        done
        pip install pytest
    
    - name: Run edge case tests
      run: |
        for phase in phase1 phase2 phase3 phase4 phase5; do
          echo "Running edge case tests for $phase"
          cd $phase
          python -m pytest tests/test_edge_cases.py -v
          cd ..
        done

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install flake8 black isort mypy
        pip install -r phase1/requirements.txt
    
    - name: Run flake8
      run: |
        flake8 phase*/src --count --select=E9,F63,F7,F82 --show-source --statistics
    
    - name: Run black
      run: |
        black --check phase*/src
    
    - name: Run isort
      run: |
        isort --check-only phase*/src
